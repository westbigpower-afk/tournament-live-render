<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인하의대 스매쉬 토너먼트 대진표</title>
<style>
/* (기존 CSS 그대로 - 생략 없음) */
body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; }
h1 { color: #333; text-align: center; }
/* ... 생략 없이 그대로 유지 ... */
.reset-button { background-color: #dc3545; margin-top: 20px; }
.reset-button:hover { background-color: #c82333; }
</style>
</head>

<body>
<div class="container">
<h1>🏆 인하의대 스매쉬 토너먼트 대진표</h1>

<div class="input-section">
<p>
참여자의 이름과 성별을 입력하세요.<br>
<span style="font-size: 13px; color: #666;">
링크를 가진 모두가 같은 대진표와 승자 선택 결과를 실시간으로 봅니다.
팀은 랜덤입니다! 승자 수정은 <b>꾹 누르기 → OK</b>입니다.
</span>
</p>

<div id="participantList" class="participant-list"></div>
<button class="small-button" onclick="addParticipantRow()">+ 참가자 추가</button><br>
<button onclick="generateBracket()">대진표 짜기</button>
<div id="connectionStatus">서버 연결 중...</div>
</div>

<div id="teamsOutput" class="teams-section"></div>

<div class="controls" id="zoomControl" style="display:none;">
<label>🔍</label>
<input type="range" id="zoomSlider" min="0.4" max="1.2" step="0.1" value="0.9" oninput="changeZoom()">
</div>

<div class="scroll-wrapper">
<div id="bracketZoomArea" class="bracket-area">
<svg id="linesOverlay"></svg>
<div id="bracketOutput" class="bracket-container"></div>
</div>
</div>

<div id="thirdPlaceSection"></div>
<div id="finalWinner"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const EMPTY_WINNER='? (승자)';
const socket=io();

window.rounds=[];
window.thirdPlaceResult=null;

/* ✅ 변경 1: 롱프레스 변수 */
const LONG_PRESS_TIME=800;
let longPressTimer=null;
let longPressTriggered=false;

/* ---------------- 기존 코드 유지 ---------------- */

function handleTeamClick(match,slot){
if(match.isBye)return;

const clickedName=slot===1?match.t1.name:match.t2.name;
if(clickedName.includes('?'))return;

/* 승자 없을 때만 선택 */
if(match.winner===EMPTY_WINNER){
socket.emit('winner:select',{matchId:match.id,slot});
}
}

/* ✅ 변경 2: 롱프레스 함수 */
function handleTeamLongPress(match){
if(match.isBye)return;
if(match.winner===EMPTY_WINNER)return;

if(confirm('승자를 바꾸시겠습니까?')){
socket.emit('winner:reset',{matchId:match.id});
}
}

/* ---------------- drawBracket 수정 ---------------- */

function drawBracket(){
const container=document.getElementById('bracketOutput');
container.innerHTML='';

window.rounds.forEach(round=>{
const roundDiv=document.createElement('div');
roundDiv.className='round';

round.forEach(match=>{
const matchDiv=document.createElement('div');
matchDiv.className='match';

const t1=document.createElement('div');
t1.innerText=match.t1.name;

const t2=document.createElement('div');
t2.innerText=match.t2.name;

[t1,t2].forEach((div,index)=>{

let slot=index+1;
let teamName=div.innerText;

if(teamName==='부전승 (Bye)'){
div.className='team bye';
}else if(teamName.includes('?')){
div.className='team empty-slot';
}else{
div.className='team clickable';

/* ✅ 변경 3: 롱프레스 이벤트 */
div.onmousedown=()=>{
longPressTriggered=false;
longPressTimer=setTimeout(()=>{
longPressTriggered=true;
handleTeamLongPress(match);
},LONG_PRESS_TIME);
};

div.onmouseup=()=>{
clearTimeout(longPressTimer);
if(!longPressTriggered){
handleTeamClick(match,slot);
}
};

div.onmouseleave=()=>clearTimeout(longPressTimer);

div.ontouchstart=()=>{
longPressTriggered=false;
longPressTimer=setTimeout(()=>{
longPressTriggered=true;
handleTeamLongPress(match);
},LONG_PRESS_TIME);
};

div.ontouchend=()=>{
clearTimeout(longPressTimer);
if(!longPressTriggered){
handleTeamClick(match,slot);
}
};
}

matchDiv.appendChild(div);
});

roundDiv.appendChild(matchDiv);
});

container.appendChild(roundDiv);
});
}

</script>
</body>
</html>
